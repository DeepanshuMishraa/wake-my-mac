name: Build StayRunning release DMG

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: stayrunning-release
  cancel-in-progress: false

jobs:
  publish_release:
    name: Build, verify, and publish
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Prereleases are not published to the stable Sparkle feed or website." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use the format V0.0.1; received: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve version metadata
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#V}"
          SOURCE_VERSION="$(tr -d '\n' < VERSION)"
          if [[ "$SOURCE_VERSION" != "$VERSION" ]]; then
            echo "Release tag $RELEASE_TAG does not match VERSION ($SOURCE_VERSION)." >&2
            exit 1
          fi
          BUILD_NUMBER="$(./Scripts/version-build-number.sh "$VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Validate updater publishing configuration
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          for name in SPARKLE_PRIVATE_KEY SPARKLE_PUBLIC_ED_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID R2_BUCKET_NAME; do
            if [[ -z "${!name}" ]]; then
              echo "Configure the $name repository secret before publishing releases." >&2
              exit 1
            fi
          done

      - name: Run tests
        run: swift test

      - name: Build application bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: ./Scripts/build-app.sh

      - name: Create DMG
        id: dmg
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x Scripts/create-dmg.sh
          DMG_PATH="$(./Scripts/create-dmg.sh)"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify packaged application
        env:
          SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          DMG_PATH: ${{ steps.dmg.outputs.path }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
        run: ./Scripts/verify-release-dmg.sh "$DMG_PATH" "$VERSION" "$BUILD_NUMBER"

      - name: Sign update and create appcast
        id: appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
        run: |
          SIGN_UPDATE="$(find .build -type f -name sign_update -perm -111 -not -path '*/old_dsa_scripts/*' -print -quit)"
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "Sparkle sign_update tool was not found in SwiftPM artifacts." >&2
            exit 1
          fi
          SIGNATURE_OUTPUT="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$DMG_PATH")"
          SIGNED_FILE_LENGTH="$(printf '%s\n' "$SIGNATURE_OUTPUT" | sed -n 's/.*length="\([0-9]*\)".*/\1/p' | head -n 1)"
          ACTUAL_FILE_LENGTH="$(stat -f%z "$DMG_PATH")"
          if [[ -z "$SIGNED_FILE_LENGTH" || "$SIGNED_FILE_LENGTH" != "$ACTUAL_FILE_LENGTH" ]]; then
            echo "Sparkle signed length $SIGNED_FILE_LENGTH does not match DMG length $ACTUAL_FILE_LENGTH." >&2
            exit 1
          fi
          DOWNLOAD_URL="https://pub-0f452c90e334438d8e4a54f9b977a5ea.r2.dev/StayRunning-${VERSION}.dmg"
          chmod +x Scripts/create-appcast.sh
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"
          ./Scripts/create-appcast.sh "$VERSION" "$BUILD_NUMBER" "$DOWNLOAD_URL" "$SIGNATURE_OUTPUT" "$APPCAST_PATH"
          xmllint --noout "$APPCAST_PATH"
          grep -Fq "<sparkle:version>${BUILD_NUMBER}</sparkle:version>" "$APPCAST_PATH"
          grep -Fq "$DOWNLOAD_URL" "$APPCAST_PATH"
          echo "path=$APPCAST_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish versioned DMG to R2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
        run: |
          OBJECT_NAME="StayRunning-${VERSION}.dmg"
          PUBLIC_BASE_URL="https://pub-0f452c90e334438d8e4a54f9b977a5ea.r2.dev"
          npx --yes wrangler@4.114.0 r2 object put "${R2_BUCKET_NAME}/${OBJECT_NAME}" \
            --remote \
            --file="$DMG_PATH" \
            --content-type="application/x-apple-diskimage" \
            --content-disposition="attachment; filename=${OBJECT_NAME}" \
            --cache-control="public, max-age=300, must-revalidate"
          REMOTE_DMG="$RUNNER_TEMP/$OBJECT_NAME"
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors \
            "${PUBLIC_BASE_URL}/${OBJECT_NAME}?release-check=${GITHUB_RUN_ID}" \
            --output "$REMOTE_DMG"
          cmp "$DMG_PATH" "$REMOTE_DMG"

      - name: Upload updater assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
          APPCAST_PATH: ${{ steps.appcast.outputs.path }}
        run: |
          gh release upload "$RELEASE_TAG" "$DMG_PATH" "$APPCAST_PATH" --clobber
          REMOTE_APPCAST="$RUNNER_TEMP/published-appcast.xml"
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/appcast.xml?release-check=${GITHUB_RUN_ID}" \
            --output "$REMOTE_APPCAST"
          cmp "$APPCAST_PATH" "$REMOTE_APPCAST"

  update_website:
    name: Update website download
    needs: publish_release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update website release
        env:
          VERSION: ${{ needs.publish_release.outputs.version }}
        run: ./Scripts/set-web-release.sh "$VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Verify website build
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Commit and push website release
        id: website_commit
        env:
          VERSION: ${{ needs.publish_release.outputs.version }}
        run: |
          if git diff --quiet -- web/app/release.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/app/release.ts
          git commit -m "Update website download to v${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Verify Vercel deployment
        env:
          VERSION: ${{ needs.publish_release.outputs.version }}
        run: |
          EXPECTED_FILE="StayRunning-${VERSION}.dmg"
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --location \
              "https://stayrunning.dipxsy.app/?release-check=${GITHUB_RUN_ID}-${attempt}" |
              grep -Fq "$EXPECTED_FILE"; then
              echo "Vercel is serving $EXPECTED_FILE"
              exit 0
            fi
            sleep 10
          done
          echo "Vercel did not publish $EXPECTED_FILE within six minutes." >&2
          exit 1
