name: Build Wake My Mac release DMG

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and attach macOS DMG
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use the format V0.0.1; received: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve version metadata
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#V}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Validate release signing configuration
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          for name in APPLE_APP_SPECIFIC_PASSWORD APPLE_ID APPLE_TEAM_ID DEVELOPER_ID_APPLICATION DEVELOPER_ID_P12_BASE64 DEVELOPER_ID_P12_PASSWORD SPARKLE_PRIVATE_KEY SPARKLE_PUBLIC_ED_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Configure the $name repository secret before publishing releases." >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Configure the RELEASE_KEYCHAIN_PASSWORD repository secret before publishing releases." >&2
            exit 1
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Run tests
        run: swift test

      - name: Build application bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          CODE_SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: ./Scripts/build-app.sh

      - name: Notarize and staple application
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/Wake My Mac.app"
          ARCHIVE_PATH="$RUNNER_TEMP/Wake-My-Mac.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ARCHIVE_PATH"
          xcrun notarytool submit "$ARCHIVE_PATH" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Create DMG
        id: dmg
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x Scripts/create-dmg.sh
          DMG_PATH="$(./Scripts/create-dmg.sh)"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize and staple DMG
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
        run: |
          xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"

      - name: Sign update and create appcast
        id: appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
        run: |
          SIGN_UPDATE="$(find .build -type f -name sign_update -perm -111 -not -path '*/old_dsa_scripts/*' -print -quit)"
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "Sparkle sign_update tool was not found in SwiftPM artifacts." >&2
            exit 1
          fi
          SIGNATURE_OUTPUT="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$DMG_PATH")"
          SIGNED_FILE_LENGTH="$(printf '%s\n' "$SIGNATURE_OUTPUT" | sed -n 's/.*length="\([0-9]*\)".*/\1/p' | head -n 1)"
          ACTUAL_FILE_LENGTH="$(stat -f%z "$DMG_PATH")"
          if [[ -z "$SIGNED_FILE_LENGTH" || "$SIGNED_FILE_LENGTH" != "$ACTUAL_FILE_LENGTH" ]]; then
            echo "Sparkle signed length $SIGNED_FILE_LENGTH does not match DMG length $ACTUAL_FILE_LENGTH." >&2
            exit 1
          fi
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/Wake-My-Mac-${VERSION}.dmg"
          chmod +x Scripts/create-appcast.sh
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"
          ./Scripts/create-appcast.sh "$VERSION" "$BUILD_NUMBER" "$DOWNLOAD_URL" "$SIGNATURE_OUTPUT" "$APPCAST_PATH"
          echo "path=$APPCAST_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload updater assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
          APPCAST_PATH: ${{ steps.appcast.outputs.path }}
        run: gh release upload "$RELEASE_TAG" "$DMG_PATH" "$APPCAST_PATH" --clobber
